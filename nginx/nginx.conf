events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    gzip on;

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # API Gateway
        location /api/ {
            proxy_pass         http://erp-gateway:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Origin            $http_origin;
            proxy_set_header   Access-Control-Request-Headers $http_access_control_request_headers;
            proxy_set_header   Access-Control-Request-Method $http_access_control_request_method;
            proxy_pass_header  Access-Control-Allow-Origin;
            proxy_pass_header  Access-Control-Allow-Methods;
            proxy_pass_header  Access-Control-Allow-Headers;
        }

        location /health {
            proxy_pass http://erp-gateway:3000/health;
        }

        # Page par défaut
        location / {
            return 200 'DataProtect ERP - API OK';
            add_header Content-Type text/plain;
        }
    }
}
