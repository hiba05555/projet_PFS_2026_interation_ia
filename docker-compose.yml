  # ============================================================================
  # SERVICES AI - CHATBOT
  # ============================================================================
  

  chromadb:
    # 0.4.22 est incompatible avec NumPy 2.0 (np.float_ supprimé) : le script de démarrage
    # de cette image réinstalle systématiquement le dernier NumPy, ce qui provoque une
    # boucle de crash au démarrage. Les clients utilisés (npm chromadb@^1.7.3, script
    # Python vectorize_docs.py) ciblent de toute façon l'API ChromaDB >= 1.0.0.
    image: chromadb/chroma:1.0.20
    container_name: erp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - erp-back-tier
    restart: unless-stopped

  ollama:
    build:
      context: ./chatbot-finetuning
      dockerfile: Dockerfile
    container_name: erp-ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - erp-back-tier
    restart: unless-stopped 

  chatbot-service:
    build:
      context: ./chatbot-service
      dockerfile: Dockerfile
    container_name: erp-chatbot
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://erp-ollama:11434 
      - OLLAMA_MODEL=erp-dataprotect
      - CHROMADB_URL=http://erp-chromadb:8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_me}@erp-redis:6379
      - API_GATEWAY_URL=http://erp-gateway:3000
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=erp-postgres
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:     
      - chromadb
      - redis
      - api-gateway
      - postgres
    networks:
      - erp-back-tier
      - erp-front-tier
    restart: unless-stopped



# ============================================================================
  # COUCHE MONITORING
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: erp-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks:
      - erp-back-tier
      - erp-front-tier
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: erp-grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - erp-front-tier
      - erp-back-tier
    restart: unless-stopped

  caddvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: erp-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - erp-back-tier
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: erp-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - erp-back-tier
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: erp-logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./monitoring/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - erp-back-tier
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: erp-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - erp-back-tier
      - erp-front-tier
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: erp-filebeat
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./monitoring/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    networks:
      - erp-back-tier
    restart: unless-stopped


networks:
  erp-front-tier:
    driver: bridge
  erp-back-tier:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  grafana_data:
  chromadb_data:
  ollama_data: 
  prometheus_data:
  elasticsearch_data: