services:
  postgres:
    image: postgres:15-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - erp-back-tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    networks:
      - erp-back-tier
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - erp-back-tier
    restart: unless-stopped

  nginx:
   image: nginx:alpine
   container_name: erp-nginx
   ports:
     - "80:80"
   volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
   depends_on:
     - api-gateway
   networks:
     - erp-front-tier
   restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: erp-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://erp-auth:3001
      IT_HELPDESK_URL: http://erp-it-helpdesk:3101
      IT_ACCOUNTS_URL: http://erp-it-accounts:3102
      IT_EQUIPMENT_URL: http://erp-it-equipment:3103
      IT_MONITORING_URL: http://erp-it-monitoring:3104
      IT_LICENSES_URL: http://erp-it-licenses:3105
      HR_EMPLOYEES_URL: http://erp-hr-employees:3201
      HR_LEAVE_URL: http://erp-hr-leave:3202
      HR_RECRUITMENT_URL: http://erp-hr-recruitment:3203
      HR_PAYROLL_URL: http://erp-hr-payroll:3204
      HR_PERFORMANCE_URL: http://erp-hr-performance:3205
      FINANCE_BUDGET_URL: http://erp-finance-budget:3301
      FINANCE_REPORTS_URL: http://erp-finance-reports:3302
      FINANCE_PAYMENTS_URL: http://erp-finance-payments:3303
      FINANCE_EXPENSES_URL: http://erp-finance-expenses:3304
      FINANCE_INVOICES_URL: http://erp-finance-invoices:3305
      OPS_TASKS_URL: http://erp-ops-tasks:3401
      OPS_WORKFLOWS_URL: http://erp-ops-workflows:3402
      OPS_SUPPLIERS_URL: http://erp-ops-suppliers:3403
      OPS_PROJECTS_URL: http://erp-ops-projects:3404
      OPS_INVENTORY_URL: http://erp-ops-inventory:3405
      CHATBOT_SERVICE_URL: http://erp-chatbot:3500
    networks:
      - erp-front-tier
      - erp-back-tier
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth/auth/Dockerfile
    container_name: erp-auth
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
