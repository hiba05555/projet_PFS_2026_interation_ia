  # ============================================================================
  # SERVICES AI - CHATBOT
  # ============================================================================
  

  chromadb:
    image: chromadb/chroma:latest
    container_name: erp-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - erp-back-tier
    restart: unless-stopped

  chatbot-service:
    build:
      context: ./chatbot-service
      dockerfile: Dockerfile
    container_name: erp-chatbot
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=https://53572595caf9ef.lhr.life/
      - OLLAMA_MODEL=erp-dataprotect
      - CHROMADB_URL=http://erp-chromadb:8000
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_me}@erp-redis:6379
      - API_GATEWAY_URL=http://erp-gateway:3000
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=erp-postgres
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:     
      - chromadb
      - redis
      - api-gateway
      - postgres
    networks:
      - erp-back-tier
      - erp-front-tier
    restart: unless-stopped

networks:
  erp-front-tier:
    driver: bridge
  erp-back-tier:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  grafana_data:
  chromadb_data: