global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ── Container metrics (cAdvisor) ──────────────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── API Gateway ───────────────────────────────────────────────────────────
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['erp-gateway:3000']

  # ── Auth Service ──────────────────────────────────────────────────────────
  - job_name: 'auth-service'
    static_configs:
      - targets: ['erp-auth:3001']

  # ── IT Services ───────────────────────────────────────────────────────────
  - job_name: 'it-services'
    static_configs:
      - targets:
        - 'erp-it-helpdesk:3101'
        - 'erp-it-accounts:3102'
        - 'erp-it-equipment:3103'
        - 'erp-it-monitoring:3104'
        - 'erp-it-licenses:3105'

  # ── HR Services ───────────────────────────────────────────────────────────
  - job_name: 'hr-services'
    static_configs:
      - targets:
        - 'erp-hr-employees:3201'
        - 'erp-hr-leave:3202'
        - 'erp-hr-recruitment:3203'
        - 'erp-hr-payroll:3204'
        - 'erp-hr-performance:3205'

  # ── Finance Services ──────────────────────────────────────────────────────
  - job_name: 'finance-services'
    static_configs:
      - targets:
        - 'erp-finance-budget:3301'
        - 'erp-finance-reports:3302'
        - 'erp-finance-payments:3303'
        - 'erp-finance-expenses:3304'
        - 'erp-finance-invoices:3305'

  # ── Operations Services ───────────────────────────────────────────────────
  - job_name: 'operations-services'
    static_configs:
      - targets:
        - 'erp-ops-tasks:3401'
        - 'erp-ops-workflows:3402'
        - 'erp-ops-suppliers:3403'
        - 'erp-ops-projects:3404'
        - 'erp-ops-inventory:3405'

  # ── Chatbot Service ───────────────────────────────────────────────────────
  - job_name: 'chatbot-service'
    static_configs:
      - targets: ['erp-chatbot:3500']

  # ── Infrastructure ────────────────────────────────────────────────────────
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['erp-rabbitmq:15692']